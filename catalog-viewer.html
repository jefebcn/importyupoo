<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Catalogo Prodotti</title>
<!-- CRITICAL: no-referrer meta tag so Yupoo CDN doesn't block images -->
<meta name="referrer" content="no-referrer"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#f7f4ef;--surface:#fff;--border:#e8e3da;--text:#1a1916;--muted:#8a8580;--accent:#c8a96e;--accent-dark:#9c7a42;--shadow:0 2px 16px rgba(0,0,0,.07);--shadow-h:0 8px 40px rgba(0,0,0,.13)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}

  .topbar{position:sticky;top:0;z-index:100;background:rgba(247,244,239,.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:58px}
  .topbar-logo{font-family:'DM Serif Display',serif;font-size:20px;font-weight:400;letter-spacing:-.5px}
  .topbar-info{font-size:12px;color:var(--muted);font-weight:500}
  .topbar-right{display:flex;gap:8px;align-items:center}
  .chip{background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:4px 12px;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .2s}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff}

  .hero{padding:48px 32px 32px;max-width:1200px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap}
  .hero h1{font-family:'DM Serif Display',serif;font-size:clamp(36px,5vw,68px);font-weight:400;line-height:1;letter-spacing:-2px}
  .hero h1 em{font-style:italic;color:var(--accent)}
  .hero-right{text-align:right}
  .hero-num{font-size:48px;font-weight:300;line-height:1;color:var(--muted);font-family:'DM Sans',sans-serif}
  .hero-sub{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-top:4px}

  .controls{max-width:1200px;margin:0 auto;padding:0 32px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .search-wrap{position:relative;flex:1;min-width:180px;max-width:320px}
  .search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 14px 10px 38px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color .2s}
  .search-wrap input:focus{border-color:var(--accent)}
  .s-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px}
  .lay-btn{width:36px;height:36px;border-radius:9px;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:border-color .2s;color:var(--muted)}
  .lay-btn.on{border-color:var(--accent);color:var(--accent);background:rgba(200,169,110,.08)}
  .sort-sel{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text);outline:none;cursor:pointer}

  .grid-wrap{max-width:1200px;margin:0 auto;padding:0 32px 80px}
  #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px;transition:all .3s}
  #grid.list{grid-template-columns:1fr;gap:10px}

  .item{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .25s,box-shadow .25s;animation:fadeUp .4s ease both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .item:hover{transform:translateY(-4px);box-shadow:var(--shadow-h)}
  .img-wrap{position:relative;overflow:hidden;aspect-ratio:1;background:var(--bg)}
  .img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .4s;display:block}
  .item:hover .img-wrap img{transform:scale(1.05)}
  .img-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;gap:8px;transition:background .25s}
  .item:hover .img-overlay{background:rgba(0,0,0,.3)}
  .ov-btn{background:rgba(255,255,255,.95);border:none;border-radius:9px;padding:8px 14px;font-size:11px;font-weight:600;cursor:pointer;opacity:0;transform:translateY(6px);transition:opacity .2s,transform .2s;color:var(--text)}
  .item:hover .ov-btn{opacity:1;transform:none}
  .ov-btn:nth-child(2){transition-delay:.04s}
  .item-info{padding:12px 14px}
  .item-id{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:3px}
  .item-name{font-size:13px;font-weight:500}

  #grid.list .item{display:flex;flex-direction:row;align-items:center;border-radius:12px}
  #grid.list .img-wrap{width:72px;height:72px;aspect-ratio:unset;flex-shrink:0;border-radius:10px 0 0 10px}
  #grid.list .item-info{flex:1;padding:0 18px;display:flex;align-items:center;gap:20px}
  #grid.list .item-name{flex:1}

  /* Lightbox */
  .lb{display:none;position:fixed;inset:0;z-index:200;background:rgba(8,6,4,.94);align-items:center;justify-content:center}
  .lb.open{display:flex}
  .lb-img{max-width:90vw;max-height:86vh;object-fit:contain;border-radius:10px;display:block}
  .lb-close{position:fixed;top:18px;right:22px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:9px;padding:7px 14px;color:#fff;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s}
  .lb-close:hover{background:rgba(255,255,255,.2)}
  .lb-nav{position:fixed;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:9px;padding:14px 16px;color:#fff;font-size:18px;cursor:pointer;transition:background .2s}
  .lb-nav:hover{background:rgba(255,255,255,.2)}
  .lb-prev{left:18px}.lb-next{right:18px}
  .lb-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.08);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:8px 20px;color:rgba(255,255,255,.7);font-size:12px;display:flex;gap:14px;align-items:center;font-family:'DM Sans',sans-serif}
  .lb-dl{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .2s}
  .lb-dl:hover{opacity:.85}

  /* States */
  .loading{text-align:center;padding:80px 32px;color:var(--muted)}
  .spinner{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);border-top-color:var(--accent);animation:spin .8s linear infinite;margin:0 auto 16px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty{text-align:center;padding:80px 32px;color:var(--muted)}
  .empty .big{font-size:44px;margin-bottom:14px}
  .empty p{font-size:14px;line-height:1.7}
  .empty code{background:var(--border);border-radius:5px;padding:2px 7px;font-size:12px}

  .upload-zone{border:2px dashed var(--border);border-radius:20px;padding:56px 32px;text-align:center;margin:20px;transition:border-color .2s;cursor:pointer}
  .upload-zone:hover,.upload-zone.drag{border-color:var(--accent)}
  .upload-zone .ico{font-size:38px;margin-bottom:14px}
  .upload-zone h3{font-family:'DM Serif Display',serif;font-size:22px;font-weight:400;margin-bottom:8px}
  .upload-zone p{font-size:13px;color:var(--muted);line-height:1.7}
  .upload-zone input{display:none}
  .up-btn{display:inline-block;margin-top:18px;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:11px 26px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:opacity .2s}
  .up-btn:hover{opacity:.85}

  @media(max-width:640px){
    .hero{flex-direction:column;align-items:flex-start;padding:32px 16px 20px}
    .hero-right{text-align:left}
    #grid{grid-template-columns:repeat(2,1fr);gap:10px}
    .topbar,.grid-wrap,.controls{padding-left:16px;padding-right:16px}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo" id="cat-title">Catalogo</div>
  <div class="topbar-info" id="top-info">Caricamento...</div>
  <div class="topbar-right">
    <span class="chip on" id="chip-all">Tutti</span>
  </div>
</div>

<div class="hero">
  <h1 id="hero-h">Collezione<br/><em>Prodotti</em></h1>
  <div class="hero-right">
    <div class="hero-num" id="hero-n">—</div>
    <div class="hero-sub">Articoli</div>
  </div>
</div>

<div class="controls">
  <div class="search-wrap">
    <span class="s-icon">🔍</span>
    <input type="text" id="search" placeholder="Cerca #numero..." oninput="filter()"/>
  </div>
  <button class="lay-btn on" id="btn-g" onclick="setLayout('grid')" title="Griglia">⊞</button>
  <button class="lay-btn" id="btn-l" onclick="setLayout('list')" title="Lista">☰</button>
  <select class="sort-sel" onchange="render()">
    <option value="default">Ordine originale</option>
    <option value="asc">ID crescente</option>
    <option value="desc">ID decrescente</option>
  </select>
</div>

<div class="grid-wrap">
  <div id="grid">
    <div class="loading"><div class="spinner"></div><p>Caricamento catalogo...</p></div>
  </div>
</div>

<div class="lb" id="lb" onclick="lbBg(event)">
  <button class="lb-close" onclick="closeLb()">✕ Chiudi</button>
  <button class="lb-nav lb-prev" onclick="lbGo(-1)">‹</button>
  <img id="lb-img" class="lb-img" src="" alt="" referrerpolicy="no-referrer"/>
  <button class="lb-nav lb-next" onclick="lbGo(1)">›</button>
  <div class="lb-bar">
    <span id="lb-info">1 / 1</span>
    <button class="lb-dl" onclick="dlImg()">⬇ Scarica</button>
  </div>
</div>

<script>
let allItems=[], filtered=[], lbIdx=0;

// ── Load ──────────────────────────────────────────────────────
async function load(){
  try{
    // Try catalog.json in same folder
    const r=await fetch('./catalog.json',{cache:'no-cache'});
    if(r.ok){init(await r.json());return;}
  }catch{}
  showUpload();
}

function init(data){
  let items=[];
  if(Array.isArray(data)) items=data.map((u,i)=>({id:i+1,url:u,filename:`image_${String(i+1).padStart(5,'0')}.jpg`}));
  else if(data.images) items=data.images;
  else if(data.urls) items=data.urls.map((u,i)=>({id:i+1,url:u,filename:`image_${String(i+1).padStart(5,'0')}.jpg`}));

  allItems=items; filtered=[...items];
  const name=data._meta?.album||'Catalogo';
  document.getElementById('cat-title').textContent=name;
  document.getElementById('hero-h').innerHTML=`Collezione<br/><em>${name}</em>`;
  document.getElementById('hero-n').textContent=items.length;
  document.getElementById('top-info').textContent=`${items.length} articoli`;
  document.title=name;
  render();
}

function showUpload(){
  document.getElementById('cat-title').textContent='Catalogo';
  document.getElementById('top-info').textContent='Nessun catalogo';
  document.getElementById('hero-n').textContent='0';
  document.getElementById('grid').innerHTML=`
    <div class="upload-zone" id="dz"
      ondragover="event.preventDefault();this.classList.add('drag')"
      ondragleave="this.classList.remove('drag')"
      ondrop="onDrop(event)">
      <div class="ico">📂</div>
      <h3>Carica catalog.json</h3>
      <p>Trascina qui il file <code>catalog.json</code> generato dall'estrattore,<br/>
         oppure mettilo nella stessa cartella del sito e ricarica la pagina.</p>
      <input type="file" id="fi" accept=".json" onchange="onFile(event)"/>
      <button class="up-btn" onclick="document.getElementById('fi').click()">Scegli file</button>
    </div>`;
}

function onDrop(e){e.preventDefault();const f=e.dataTransfer.files[0];if(f)readJson(f);}
function onFile(e){readJson(e.target.files[0]);}
function readJson(f){
  const r=new FileReader();
  r.onload=ev=>{try{init(JSON.parse(ev.target.result));}catch{alert('JSON non valido.');}};
  r.readAsText(f);
}

// ── Render ────────────────────────────────────────────────────
function render(){
  if(!allItems.length)return;
  const sort=document.querySelector('.sort-sel').value;
  let items=[...filtered];
  if(sort==='asc') items.sort((a,b)=>a.id-b.id);
  if(sort==='desc') items.sort((a,b)=>b.id-a.id);
  const g=document.getElementById('grid');
  if(!items.length){g.innerHTML=`<div class="empty"><div class="big">🔍</div><p>Nessun risultato.</p></div>`;return;}
  g.innerHTML=items.map((item,i)=>`
    <div class="item" style="animation-delay:${Math.min(i*.025,.5)}s" onclick="openLb(${item.id-1})">
      <div class="img-wrap">
        <img src="${item.url}" alt="Prodotto ${item.id}" loading="lazy" referrerpolicy="no-referrer"
          onerror="this.closest('.img-wrap').style.background='#ede9e3';this.remove()"/>
        <div class="img-overlay">
          <button class="ov-btn" onclick="event.stopPropagation();openLb(${item.id-1})">👁 Vedi</button>
          <button class="ov-btn" onclick="event.stopPropagation();dlDirect('${item.url}','${item.filename}')">⬇</button>
        </div>
      </div>
      <div class="item-info">
        <div class="item-id">#${String(item.id).padStart(4,'0')}</div>
        <div class="item-name">${item.filename.replace(/\.[^.]+$/,'')}</div>
      </div>
    </div>`).join('');
}

function filter(){
  const q=document.getElementById('search').value.toLowerCase();
  filtered=allItems.filter(x=>!q||String(x.id).includes(q)||x.filename.toLowerCase().includes(q));
  render();
}

function setLayout(m){
  document.getElementById('grid').classList.toggle('list',m==='list');
  document.getElementById('btn-g').classList.toggle('on',m==='grid');
  document.getElementById('btn-l').classList.toggle('on',m==='list');
}

// ── Lightbox ──────────────────────────────────────────────────
function openLb(i){lbIdx=i;updateLb();document.getElementById('lb').classList.add('open');document.body.style.overflow='hidden';}
function closeLb(){document.getElementById('lb').classList.remove('open');document.body.style.overflow='';}
function lbBg(e){if(e.target===document.getElementById('lb'))closeLb();}
function lbGo(d){lbIdx=(lbIdx+d+allItems.length)%allItems.length;updateLb();}
function updateLb(){
  const it=allItems[lbIdx];
  const img=document.getElementById('lb-img');
  img.src=it.url;
  img.referrerPolicy='no-referrer';
  document.getElementById('lb-info').textContent=`${lbIdx+1} / ${allItems.length} — #${String(it.id).padStart(4,'0')}`;
}
function dlImg(){const it=allItems[lbIdx];dlDirect(it.url,it.filename);}
function dlDirect(url,name){const a=document.createElement('a');a.href=url;a.download=name;a.target='_blank';a.click();}

document.addEventListener('keydown',e=>{
  if(!document.getElementById('lb').classList.contains('open'))return;
  if(e.key==='ArrowLeft')lbGo(-1);
  if(e.key==='ArrowRight')lbGo(1);
  if(e.key==='Escape')closeLb();
});

load();
</script>
</body>
</html>
