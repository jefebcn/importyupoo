<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="referrer" content="no-referrer"/>
<title>Catalogo Prodotti</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#f7f4ef;--surface:#fff;--border:#e8e3da;--text:#1a1916;--muted:#8a8580;--accent:#c8a96e;--shadow:0 2px 16px rgba(0,0,0,.07);--shadow-h:0 8px 40px rgba(0,0,0,.13)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}

  .topbar{position:sticky;top:0;z-index:100;background:rgba(247,244,239,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:56px}
  .logo{font-family:'DM Serif Display',serif;font-size:20px;letter-spacing:-.5px}
  .topbar-info{font-size:12px;color:var(--muted);font-weight:500}
  /* proxy status pill */
  .proxy-pill{font-size:10px;font-weight:600;padding:4px 10px;border-radius:999px;border:1px solid;display:none}
  .proxy-pill.on{display:inline-block;background:rgba(200,169,110,.1);border-color:rgba(200,169,110,.4);color:var(--accent)}

  .hero{padding:44px 32px 28px;max-width:1200px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap}
  .hero h1{font-family:'DM Serif Display',serif;font-size:clamp(34px,5vw,64px);font-weight:400;line-height:1;letter-spacing:-2px}
  .hero h1 em{font-style:italic;color:var(--accent)}
  .hero-meta{text-align:right}
  .hero-num{font-size:46px;font-weight:300;color:var(--muted);line-height:1}
  .hero-sub{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-top:4px}

  .controls{max-width:1200px;margin:0 auto;padding:0 32px 22px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .search-wrap{position:relative;flex:1;min-width:180px;max-width:300px}
  .search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 14px 10px 36px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color .2s}
  .search-wrap input:focus{border-color:var(--accent)}
  .si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px}
  .lay-btn{width:36px;height:36px;border-radius:9px;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--muted);transition:all .2s}
  .lay-btn.on{border-color:var(--accent);color:var(--accent);background:rgba(200,169,110,.08)}
  .sort-sel{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text);outline:none;cursor:pointer}

  .grid-wrap{max-width:1200px;margin:0 auto;padding:0 32px 80px}
  #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px}
  #grid.list{grid-template-columns:1fr;gap:10px}

  .item{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .25s,box-shadow .25s;animation:fadeUp .35s ease both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .item:hover{transform:translateY(-4px);box-shadow:var(--shadow-h)}

  .img-wrap{position:relative;overflow:hidden;aspect-ratio:1;background:#ede9e2}
  /* Loading spinner inside each card */
  .img-wrap::before{content:'';position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  .img-wrap.loading::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:24px;height:24px;border-radius:50%;border:2px solid #d8d4ce;border-top-color:var(--accent);animation:spin .7s linear infinite}
  @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
  .img-wrap.error::after{content:'✕';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#ccc;font-size:20px;animation:none}

  .img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .4s, opacity .3s;display:block;opacity:0}
  .img-wrap img.loaded{opacity:1}
  .item:hover .img-wrap img{transform:scale(1.05)}

  .img-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;gap:8px;transition:background .25s}
  .item:hover .img-overlay{background:rgba(0,0,0,.3)}
  .ov-btn{background:rgba(255,255,255,.95);border:none;border-radius:9px;padding:8px 14px;font-size:11px;font-weight:600;cursor:pointer;opacity:0;transform:translateY(6px);transition:opacity .2s,transform .2s;color:var(--text)}
  .item:hover .ov-btn{opacity:1;transform:none}
  .ov-btn:nth-child(2){transition-delay:.04s}

  .item-info{padding:12px 14px}
  .item-id{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:3px}
  .item-name{font-size:13px;font-weight:500}

  #grid.list .item{display:flex;flex-direction:row;align-items:center;border-radius:12px}
  #grid.list .img-wrap{width:72px;height:72px;aspect-ratio:unset;flex-shrink:0;border-radius:10px 0 0 10px}
  #grid.list .item-info{flex:1;padding:0 18px;display:flex;align-items:center;gap:20px}
  #grid.list .item-name{flex:1}

  /* Lightbox */
  .lb{display:none;position:fixed;inset:0;z-index:200;background:rgba(8,6,4,.95);align-items:center;justify-content:center}
  .lb.open{display:flex}
  .lb-img{max-width:90vw;max-height:86vh;object-fit:contain;border-radius:10px;display:block}
  .lb-close{position:fixed;top:18px;right:22px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:9px;padding:7px 14px;color:#fff;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s}
  .lb-close:hover{background:rgba(255,255,255,.2)}
  .lb-nav{position:fixed;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:9px;padding:14px 16px;color:#fff;font-size:18px;cursor:pointer;transition:background .2s}
  .lb-nav:hover{background:rgba(255,255,255,.2)}
  .lb-prev{left:18px}.lb-next{right:18px}
  .lb-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.08);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:8px 20px;color:rgba(255,255,255,.7);font-size:12px;display:flex;gap:14px;align-items:center}
  .lb-dl{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;transition:opacity .2s}
  .lb-dl:hover{opacity:.85}

  .loading-state{text-align:center;padding:80px 32px;color:var(--muted)}
  .spinner{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);border-top-color:var(--accent);animation:spin .8s linear infinite;margin:0 auto 16px}

  .upload-zone{border:2px dashed var(--border);border-radius:20px;padding:56px 32px;text-align:center;margin:20px;transition:border-color .2s;cursor:pointer}
  .upload-zone:hover,.upload-zone.drag{border-color:var(--accent)}
  .upload-zone h3{font-family:'DM Serif Display',serif;font-size:22px;font-weight:400;margin-bottom:8px;margin-top:12px}
  .upload-zone p{font-size:13px;color:var(--muted);line-height:1.7}
  .upload-zone input{display:none}
  .up-btn{display:inline-block;margin-top:18px;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:11px 26px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;cursor:pointer}

  @media(max-width:640px){
    .hero{flex-direction:column;align-items:flex-start;padding:28px 16px 16px}
    .hero-meta{text-align:left}
    #grid{grid-template-columns:repeat(2,1fr);gap:10px}
    .topbar,.grid-wrap,.controls{padding-left:16px;padding-right:16px}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo" id="cat-title">Catalogo</div>
  <div class="topbar-info" id="top-info">Caricamento...</div>
  <span class="proxy-pill on" id="proxy-pill">🔄 via proxy</span>
</div>

<div class="hero">
  <h1 id="hero-h">Collezione<br/><em>Prodotti</em></h1>
  <div class="hero-meta">
    <div class="hero-num" id="hero-n">—</div>
    <div class="hero-sub">Articoli</div>
  </div>
</div>

<div class="controls">
  <div class="search-wrap">
    <span class="si">🔍</span>
    <input type="text" id="search" placeholder="Cerca #numero..." oninput="filter()"/>
  </div>
  <button class="lay-btn on" id="btn-g" onclick="setLayout('grid')">⊞</button>
  <button class="lay-btn" id="btn-l" onclick="setLayout('list')">☰</button>
  <select class="sort-sel" onchange="render()">
    <option value="default">Ordine originale</option>
    <option value="asc">ID crescente</option>
    <option value="desc">ID decrescente</option>
  </select>
</div>

<div class="grid-wrap">
  <div id="grid"><div class="loading-state"><div class="spinner"></div><p>Caricamento...</p></div></div>
</div>

<div class="lb" id="lb" onclick="lbBg(event)">
  <button class="lb-close" onclick="closeLb()">✕ Chiudi</button>
  <button class="lb-nav lb-prev" onclick="lbGo(-1)">‹</button>
  <img id="lb-img" class="lb-img" src="" alt="" referrerpolicy="no-referrer"/>
  <button class="lb-nav lb-next" onclick="lbGo(1)">›</button>
  <div class="lb-bar">
    <span id="lb-info">1 / 1</span>
    <button class="lb-dl" onclick="dlImg()">⬇ Scarica</button>
  </div>
</div>

<script>
let allItems = [], filtered = [], lbIdx = 0;
let shopHost = ''; // extracted from catalog _meta.shopHost or _meta.source

// ─────────────────────────────────────────────────────────────────────────────
// PROXY CHAIN — ordered by reliability for Yupoo hotlink-protected images
//
// Root cause: photo.yupoo.com CDN checks the HTTP Referer header.
// Direct browser requests send Referer from our domain → BLOCKED.
// corsproxy.io sends its own Referer → BLOCKED → returns HTML error (4KB).
//
// Solution: wsrv.nl supports &ref= to set a custom Referer.
// By setting ref=shophost (e.g. huskyreps.x.yupoo.com) we spoof the Referer
// to look like the request comes from inside Yupoo itself → ALLOWED.
// ─────────────────────────────────────────────────────────────────────────────
function buildProxies(url, origUrl) {
  const strip = u => u.replace(/^https?:\/\//, '');
  const ref = shopHost || 'yupoo.com';
  const wsrv  = u => `https://wsrv.nl/?url=${encodeURIComponent(strip(u))}&ref=${encodeURIComponent(ref)}&output=jpg&maxage=1d`;
  const weserv = u => `https://images.weserv.nl/?url=${encodeURIComponent(strip(u))}&ref=${encodeURIComponent(ref)}&output=jpg`;
  const corpus = u => `https://corsproxy.io/?${encodeURIComponent(u)}`;
  const orig = origUrl || url;
  // origUrl is the thumbnail from HTML - GUARANTEED to exist
  // url is the HD version (fit_p_900_900) - may not always exist
  return [
    wsrv(orig),      // 1. thumbnail via wsrv+ref → guaranteed to work
    weserv(orig),    // 2. thumbnail via weserv+ref (backup)
    wsrv(url),       // 3. HD via wsrv+ref (if exists)
    corpus(orig),    // 4. thumbnail via corsproxy (no hotlink spoof, may fail)
  ].filter(Boolean);
}

// ── Load catalog ──────────────────────────────────────────────────────────
async function load() {
  try {
    const r = await fetch('./catalog.json', { cache: 'no-cache' });
    if (r.ok) { init(await r.json()); return; }
  } catch {}
  showUpload();
}

function init(data) {
  let items = [];
  if (Array.isArray(data)) {
    items = data.map((u, i) => ({ id: i+1, url: u, filename: `image_${String(i+1).padStart(5,'0')}.jpg` }));
  } else if (data.images) {
    items = data.images;
  } else if (data.urls) {
    items = data.urls.map((u, i) => ({ id: i+1, url: u, filename: `image_${String(i+1).padStart(5,'0')}.jpg` }));
  }

  // Extract shopHost for Referer spoofing
  const meta = data._meta || {};
  shopHost = meta.shopHost || '';
  if (!shopHost && meta.source) {
    try { shopHost = new URL(meta.source).hostname; } catch {}
  }
  if (!shopHost && items[0]?.url) {
    // Derive shop subdomain from image URL pattern: photo.yupoo.com/USERNAME/...
    const m = items[0].url.match(/photo\.yupoo\.com\/([^/]+)\//);
    if (m) shopHost = m[1] + '.x.yupoo.com';
  }

  allItems = items; filtered = [...items];
  const name = meta.album || 'Catalogo';
  document.getElementById('cat-title').textContent = name;
  document.getElementById('hero-h').innerHTML = `Collezione<br/><em>${name}</em>`;
  document.getElementById('hero-n').textContent = items.length;
  document.getElementById('top-info').textContent = `${items.length} articoli`;
  document.title = name;

  const pill = document.getElementById('proxy-pill');
  if (shopHost) {
    pill.style.display = 'inline-block';
    pill.textContent = `🔄 wsrv.nl+ref`;
  }
  render();
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  if (!allItems.length) return;
  const sort = document.querySelector('.sort-sel').value;
  let items = [...filtered];
  if (sort === 'asc')  items.sort((a, b) => a.id - b.id);
  if (sort === 'desc') items.sort((a, b) => b.id - a.id);

  const g = document.getElementById('grid');
  if (!items.length) {
    g.innerHTML = `<div style="padding:60px;text-align:center;color:var(--muted)">Nessun risultato</div>`;
    return;
  }

  g.innerHTML = items.map((item, i) => {
    const origUrl = item.originalUrl || item.url;
    // Use the original thumbnail URL (guaranteed to exist in CDN) via wsrv.nl+ref
    const origUrl2 = item.originalUrl || item.url;
    const firstSrc = `https://wsrv.nl/?url=${encodeURIComponent(origUrl2.replace(/^https?:\/\//, ''))}&ref=${encodeURIComponent(shopHost || 'yupoo.com')}&output=jpg&maxage=1d`;
    return `
    <div class="item" style="animation-delay:${Math.min(i*.02,.4)}s" onclick="openLb(${item.id-1})">
      <div class="img-wrap loading" id="wrap-${item.id}">
        <img
          src="${firstSrc}"
          alt="Prodotto ${item.id}"
          loading="lazy"
          referrerpolicy="no-referrer"
          data-hd="${item.url}"
          data-orig="${origUrl}"
          data-retries="0"
          onload="imgLoaded(this,${item.id})"
          onerror="imgError(this,${item.id})"
        />
        <div class="img-overlay">
          <button class="ov-btn" onclick="event.stopPropagation();openLb(${item.id-1})">👁 Vedi</button>
          <button class="ov-btn" onclick="event.stopPropagation();downloadSingle(${item.id-1})">⬇</button>
        </div>
      </div>
      <div class="item-info">
        <div class="item-id">#${String(item.id).padStart(4,'0')}</div>
        <div class="item-name">${item.filename.replace(/\.[^.]+$/,'')}</div>
      </div>
    </div>`;
  }).join('');
}

function imgLoaded(img, id) {
  img.classList.add('loaded');
  const wrap = document.getElementById('wrap-' + id);
  if (wrap) { wrap.classList.remove('loading','error'); }
}

function imgError(img, id) {
  const wrap = document.getElementById('wrap-' + id);
  let retries = parseInt(img.dataset.retries || '0') + 1;
  img.dataset.retries = retries;

  const proxies = buildProxies(img.dataset.hd, img.dataset.orig);
  // retries=1 means initial wsrv failed, try next in chain (skip index 0 = wsrv which already failed)
  if (retries < proxies.length) {
    img.src = proxies[retries];
  } else {
    if (wrap) { wrap.classList.remove('loading'); wrap.classList.add('error'); }
  }
}

function filter() {
  const q = document.getElementById('search').value.toLowerCase();
  filtered = allItems.filter(x => !q || String(x.id).includes(q) || x.filename.toLowerCase().includes(q));
  render();
}

function setLayout(m) {
  document.getElementById('grid').classList.toggle('list', m === 'list');
  document.getElementById('btn-g').classList.toggle('on', m === 'grid');
  document.getElementById('btn-l').classList.toggle('on', m === 'list');
}

// ── Lightbox ──────────────────────────────────────────────────────────────
function openLb(i) { lbIdx = i; updateLb(); document.getElementById('lb').classList.add('open'); document.body.style.overflow = 'hidden'; }
function closeLb() { document.getElementById('lb').classList.remove('open'); document.body.style.overflow = ''; }
function lbBg(e) { if (e.target === document.getElementById('lb')) closeLb(); }
function lbGo(d) { lbIdx = (lbIdx + d + allItems.length) % allItems.length; updateLb(); }

function updateLb() {
  const it = allItems[lbIdx];
  const lbImg = document.getElementById('lb-img');
  const origUrl = it.originalUrl || it.url;
  const ref = shopHost || 'yupoo.com';
  const origUrlLb = it.originalUrl || it.url;
  const firstSrc = `https://wsrv.nl/?url=${encodeURIComponent(origUrlLb.replace(/^https?:\/\//, ''))}&ref=${encodeURIComponent(ref)}&output=jpg&maxage=1d`;

  lbImg.dataset.hd = it.url;
  lbImg.dataset.orig = origUrl;
  lbImg.dataset.retries = '0';
  lbImg.src = firstSrc;
  lbImg.referrerPolicy = 'no-referrer';
  lbImg.onerror = () => {
    const r = parseInt(lbImg.dataset.retries || '0') + 1;
    lbImg.dataset.retries = r;
    const proxies = buildProxies(lbImg.dataset.hd, lbImg.dataset.orig);
    if (r < proxies.length) lbImg.src = proxies[r];
  };
  document.getElementById('lb-info').textContent = `${lbIdx+1} / ${allItems.length} — #${String(it.id).padStart(4,'0')}`;
}

// ── Download single image via fetch+blob (bypasses hotlink protection) ──
async function downloadSingle(idx) {
  const it = allItems[idx];
  const ref = shopHost || 'yupoo.com';
  const proxies = buildProxies(it.url, it.originalUrl || it.url);
  for (const proxyUrl of proxies) {
    try {
      const r = await fetch(proxyUrl, { cache: 'no-store' });
      if (!r.ok) continue;
      const b = await r.blob();
      if (b.size < 2000) continue; // Skip HTML error pages
      const ct = b.type || '';
      if (ct.startsWith('image/') || b.size > 5000) {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(b);
        a.download = it.filename;
        a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 5000);
        return;
      }
    } catch {}
  }
  // Last resort: open in new tab
  window.open(it.url, '_blank');
}

function dlImg() { downloadSingle(lbIdx); }

document.addEventListener('keydown', e => {
  if (!document.getElementById('lb').classList.contains('open')) return;
  if (e.key === 'ArrowLeft') lbGo(-1);
  if (e.key === 'ArrowRight') lbGo(1);
  if (e.key === 'Escape') closeLb();
});

// ── Upload fallback ───────────────────────────────────────────────────────
function showUpload() {
  document.getElementById('top-info').textContent = 'Nessun catalogo';
  document.getElementById('hero-n').textContent = '0';
  document.getElementById('grid').innerHTML = `
    <div class="upload-zone" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="onDrop(event)">
      <div style="font-size:36px">📂</div>
      <h3>Carica catalog.json</h3>
      <p>Trascina il file <code>catalog.json</code> oppure clicca per selezionarlo.<br/>In alternativa, mettilo nella stessa cartella del sito.</p>
      <input type="file" id="fi" accept=".json" onchange="onFile(event)"/>
      <button class="up-btn" onclick="document.getElementById('fi').click()">Scegli file</button>
    </div>`;
}
function onDrop(e) { e.preventDefault(); const f = e.dataTransfer.files[0]; if (f) readJson(f); }
function onFile(e) { readJson(e.target.files[0]); }
function readJson(f) {
  const r = new FileReader();
  r.onload = ev => { try { init(JSON.parse(ev.target.result)); } catch { alert('JSON non valido.'); } };
  r.readAsText(f);
}

load();
</body>
</html>
